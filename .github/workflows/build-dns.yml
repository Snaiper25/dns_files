name: Build MikroTik DNS script

on:
  push:
    paths:
      - 'domains/**'
      - 'scripts/generate_dns.py'
      - '.github/workflows/build-dns.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate dns-auto.rsc
        run: python scripts/generate_dns.py

      - name: Commit generated file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/dns-auto.rsc
          git diff --cached --quiet || git commit -m "Auto-generate dns-auto.rsc"
          git push
